
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Upload Documents
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#020617,
#0f172a,
#1e293b
);

padding:40px;

min-height:100vh;

animation:
fadePage .5s ease;

}

.box{

max-width:1000px;

margin:auto;

background:
rgba(255,255,255,.06);

backdrop-filter:
blur(20px);

border:
1px solid rgba(255,255,255,.08);

padding:35px;

border-radius:25px;

}

h2{

color:white;

margin-bottom:20px;

font-size:28px;

}

input[type="file"]{

width:100%;

padding:15px;

border-radius:12px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

color:white;

margin-bottom:20px;

}

button{

padding:14px 24px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

font-weight:600;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1d4ed8;

transform:
translateY(-2px);

}

#status{

margin-top:15px;

color:#93c5fd;

font-weight:600;

}

hr{

border:none;

height:1px;

background:
rgba(255,255,255,.08);

margin:30px 0;

}

.file-card{

background:
rgba(255,255,255,.06);

border:
1px solid rgba(255,255,255,.08);

padding:15px;

border-radius:15px;

margin-bottom:12px;

}

.file-card h3{

color:white;

font-size:16px;

word-break:break-word;

}

.back-btn{

display:inline-block;

margin-bottom:25px;

padding:12px 20px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

border-radius:12px;

text-decoration:none;

color:white;

transition:.3s;

}

.back-btn:hover{

background:
rgba(255,255,255,.15);

}

#files{

color:#cbd5e1;

}

@keyframes fadePage{

from{
opacity:0;
}

to{
opacity:1;
}

}

</style>

</head>

<body>

<a
href="dashboard.html"
class="back-btn">

Dashboard

</a>

<div class="box">

<h2>

Upload Archive Document

</h2>

<input
type="file"
id="file">

<button
onclick="uploadFile()">

Upload

</button>

<div id="status"></div>

<hr>

<h2>

Uploaded Files

</h2>

<div id="files">

Loading files...

</div>

</div>

<script>

async function uploadFile(){

const file =
document
.getElementById(
"file"
)
.files[0];

if(!file){

alert(
"Select a file"
);

return;

}

const formData =
new FormData();

formData.append(
"file",
file
);

const response =
await fetch(

"/upload",

{

method:"POST",

body:formData

}

);

const data =
await response.json();

document
.getElementById(
"status"
)
.innerText =
data.message;

loadFiles();

}

async function loadFiles(){

try{

const response =
await fetch(
"/files"
);

const data =
await response.json();

const container =
document
.getElementById(
"files"
);

if(!data.success){

container.innerHTML =
"Failed to load files";

return;

}

container.innerHTML =
"";

if(
data.files.length === 0
){

container.innerHTML =
"No files uploaded.";

return;

}

data.files.forEach(file=>{

container.innerHTML += `

<div class="file-card">

<h3>

${file.name}

</h3>

</div>

`;

});

}

catch(error){

console.log(error);

document
.getElementById(
"files"
)
.innerHTML =
"Failed to load files.";

}

}

loadFiles();

</script>

</body>

</html>
