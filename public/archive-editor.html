
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
PJ Archive Editor
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#020617,
#0f172a,
#1e293b
);

min-height:100vh;

padding:40px;

color:white;

}

.container{

max-width:1200px;

margin:auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

}

.back-btn{

text-decoration:none;

color:white;

padding:12px 18px;

border-radius:12px;

background:
rgba(255,255,255,.08);

}

.card{

background:
rgba(255,255,255,.06);

backdrop-filter:
blur(20px);

border:
1px solid rgba(255,255,255,.08);

padding:30px;

border-radius:20px;

margin-bottom:25px;

}

label{

display:block;

margin-bottom:8px;

font-weight:600;

}

input,
select,
textarea{

width:100%;

padding:15px;

margin-bottom:20px;

border:none;

outline:none;

border-radius:12px;

background:
rgba(255,255,255,.08);

color:white;

}

textarea{

min-height:250px;

resize:vertical;

}

button{

padding:14px 25px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

cursor:pointer;

font-weight:600;

}

button:hover{

background:#1d4ed8;

}

#status{

margin-top:15px;

font-weight:600;

color:#93c5fd;

}
select{

background:
rgba(255,255,255,.08);

color:white;

}

select option{

background:#0f172a;

color:white;

}
    

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>

Archive Editor

</h1>

<a
href="dashboard.html"
class="back-btn">

Back

</a>

</div>

<div class="card">

<label>

Title

</label>

<input
type="text"
id="title">

<label>

Category

</label>

<select id="category">

<option>
Witness Statement
</option>

<option>
Timeline Event
</option>

<option>
Forensic Evidence
</option>

<option>
Phone Record
</option>

<option>
Police Report
</option>

<option>
Rogatory Interview
</option>

<option>
Correspondence
</option>

<option>
Person of Interest
</option>

<option>
Location
</option>

<option>
Research Note
</option>

</select>

<label>

Date

</label>

<input
type="date"
id="record_date">

<label>

Source

</label>

<input
type="text"
id="source">

<label>

Summary

</label>

<textarea
id="summary"></textarea>

<label>

Full Record

</label>

<textarea
id="content"></textarea>

<button
onclick="saveRecord()">

Save Record

</button>

<div id="status"></div>

</div>

</div>

<script>

async function saveRecord(){

const record = {

title:
document.getElementById(
"title"
).value,

category:
document.getElementById(
"category"
).value,

record_date:
document.getElementById(
"record_date"
).value,

source:
document.getElementById(
"source"
).value,

summary:
document.getElementById(
"summary"
).value,

content:
document.getElementById(
"content"
).value

};

const response =

await fetch(

"/save-record",

{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify(
record
)

}

);

const data =
await response.json();

if(data.success){

document
.getElementById(
"status"
)
.innerText =

"Record Saved Successfully";

}else{

document
.getElementById(
"status"
)
.innerText =

data.message;

}

}

</script>

</body>

</html>
