
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
PJ Archive - User Login
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(
135deg,
#2563eb,
#1e3a8a
);

}

.card{

background:white;

padding:40px;

width:420px;

border-radius:20px;

box-shadow:
0 20px 50px rgba(0,0,0,.25);

animation:
fadeIn .8s ease;

}

h1{

margin-bottom:10px;

}

p{

color:#666;

margin-bottom:25px;

}

input{

width:100%;

padding:14px;

margin-bottom:15px;

border:1px solid #ddd;

border-radius:10px;

font-size:15px;

}

button{

width:100%;

padding:14px;

border:none;

border-radius:10px;

background:#2563eb;

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

}

button:hover{

background:#1d4ed8;

}

#message{

margin-top:15px;

text-align:center;

}

.back{

display:block;

text-align:center;

margin-top:20px;

text-decoration:none;

color:#2563eb;

}

@keyframes fadeIn{

from{

opacity:0;

transform:
translateY(20px);

}

to{

opacity:1;

transform:
translateY(0);

}

}

</style>

</head>

<body>

<div class="card">

<h1>

👤 User Login

</h1>

<p>

Access the PJ Archive

</p>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button
onclick="login()">

Login

</button>

<div id="message"></div>

<a
href="signup.html"
class="back">

Create Account

</a>

<a
href="login.html"
class="back">

← Back

</a>

</div>

<script>

async function login(){

  const email =
  document.getElementById(
    "email"
  ).value;

  const password =
  document.getElementById(
    "password"
  ).value;

  const response =

  await fetch(

    "/login",

    {

      method:"POST",

      headers:{
        "Content-Type":
        "application/json"
      },

      body:JSON.stringify({

        email,
        password

      })

    }

  );

  const data =
  await response.json();

  if(data.success){

    window.location.href =
    "/index.html";

  }

  else{

    document
    .getElementById(
      "message"
    )
    .innerText =
    data.message;

  }

}

</script>

</body>

</html>
