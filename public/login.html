
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PJ Archive</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
width:100%;
height:100%;
}

body{

width:100%;
height:100vh;

display:grid;
place-items:center;

background:
linear-gradient(
135deg,
#020617 0%,
#0f172a 50%,
#1e293b 100%
);

overflow:hidden;

}

.card{

width:600px;
max-width:90%;

padding:70px 50px;

background:
rgba(255,255,255,.08);

border-radius:30px;

border:
1px solid rgba(255,255,255,.12);

backdrop-filter:
blur(20px);

text-align:center;

box-shadow:
0 25px 70px rgba(0,0,0,.4);

}

h1{

font-size:60px;
font-weight:700;

color:white;

margin-bottom:15px;

}

.subtitle{

font-size:18px;

color:#cbd5e1;

margin-bottom:40px;

}

.btn{

display:block;

width:100%;

padding:18px;

margin-bottom:15px;

border-radius:14px;

text-decoration:none;

font-size:17px;

font-weight:600;

transition:.3s;

}

body{

animation:
pageFade 1s ease;

}

.card{

animation:
cardEntrance 1s ease;

}

.btn,
button{

position:relative;

overflow:hidden;

}

.btn::before,
button::before{

content:"";

position:absolute;

top:0;
left:-100%;

width:100%;
height:100%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.25),
transparent
);

transition:.8s;

}

.btn:hover::before,
button:hover::before{

left:100%;

}

.btn:hover,
button:hover{

transform:
translateY(-3px)
scale(1.02);

box-shadow:
0 10px 25px rgba(37,99,235,.35);

}

@keyframes pageFade{

from{

opacity:0;

}

to{

opacity:1;

}

}

@keyframes cardEntrance{

0%{

opacity:0;

transform:
translateY(40px)
scale(.95);

}

100%{

opacity:1;

transform:
translateY(0)
scale(1);

}

}


.user{

background:#2563eb;

color:white;

}

.user:hover{

background:#1d4ed8;

}

.admin{

background:#111827;

color:white;

}

.admin:hover{

background:#1f2937;

}

.footer{

margin-top:20px;

font-size:13px;

color:#94a3b8;

}

</style>

</head>

<body>

<div class="card">

<h1>
PJ Archive
</h1>

<p class="subtitle">
Madeleine McCann Research Database
</p>

<a href="Home.html" class="btn user">
Continue as User
</a>

<a href="login-admin.html" class="btn admin">
Admin Login
</a>

<div class="footer">
Research Access Portal
</div>

</div>

</body>

</html>
