<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PJ Archive Library</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
padding:40px;
min-height:100vh;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h1{
font-size:42px;
font-weight:700;
color:white;
}

.home-btn{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(20px);
color:white;
padding:12px 20px;
border-radius:12px;
text-decoration:none;
transition:.3s;
}

.home-btn:hover{
background:rgba(255,255,255,.15);
}

.search-box{
margin-bottom:25px;
}

.search-box input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:12px;
font-size:16px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.08);
color:white;
}

.search-box input::placeholder{
color:#cbd5e1;
}

#files{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:20px;
}

.file-card{
background:rgba(255,255,255,.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
transition:.3s;
}

.file-card:hover{
transform:translateY(-5px);
}

.file-card h3{
font-size:18px;
margin-bottom:10px;
word-break:break-word;
color:white;
}

.file-card p{
color:#cbd5e1;
margin-bottom:15px;
}

.btn{
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
font-weight:600;
background:#2563eb;
color:white;
transition:.3s;
}

.btn:hover{
background:#1d4ed8;
}

.empty{
background:rgba(255,255,255,.06);
padding:25px;
border-radius:20px;
text-align:center;
color:white;
}

</style>

</head>

<body>

<div class="header">
  <h1>PJ Archive Library</h1>
  <a href="index.html" class="home-btn">Home</a>
</div>

<div class="search-box">
  <input
    type="text"
    id="searchInput"
    placeholder="Search archive documents..."
    onkeyup="filterFiles()">
</div>

<div id="files">Loading files...</div>

<script>

let allFiles = [];

async function loadFiles() {
  try {
    const response = await fetch("/files");
    const data = await response.json();

    if (!data.success) {
      document.getElementById("files").innerHTML =
        '<div class="empty">Failed to load files</div>';
      return;
    }

    allFiles = data.files || [];
    renderFiles(allFiles);
  } catch (error) {
    console.log(error);
    document.getElementById("files").innerHTML =
      '<div class="empty">Error loading files</div>';
  }
}

function filterFiles() {
  const query = document.getElementById("searchInput").value.toLowerCase();
  const filtered = allFiles.filter(f => f.name.toLowerCase().includes(query));
  renderFiles(filtered);
}

function renderFiles(files) {
  const container = document.getElementById("files");
  container.innerHTML = "";

  if (files.length === 0) {
    container.innerHTML =
      '<div class="empty">No archive documents available.</div>';
    return;
  }

  files.forEach(file => {
    const card = document.createElement("div");
    card.className = "file-card";

    const title = document.createElement("h3");
    title.textContent = file.name;

    const desc = document.createElement("p");
    desc.textContent = "Archive Document";

    const button = document.createElement("button");
    button.className = "btn";
    button.textContent = "Open Document";
    button.addEventListener("click", function () {
      openFile(file.name);
    });

    card.appendChild(title);
    card.appendChild(desc);
    card.appendChild(button);
    container.appendChild(card);
  });
}

async function openFile(fileName) {
  try {
    const response = await fetch(
      "/file-url/" + encodeURIComponent(fileName)
    );

    const contentType = response.headers.get("content-type");
    if (!contentType || !contentType.includes("application/json")) {
      alert("Server error: /file-url route not found. Check your server.js.");
      return;
    }

    const data = await response.json();

    if (data.success) {
      window.open(data.url, "_blank");
    } else {
      alert(data.message || "Failed to open file");
    }
  } catch (error) {
    console.log(error);
    alert("Failed to open file: " + error.message);
  }
}

loadFiles();

</script>

</body>

</html>
