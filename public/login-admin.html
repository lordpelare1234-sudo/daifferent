
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
PJ Archive - Admin Login
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html,
body{
width:100%;
height:100%;
}

body{

display:grid;
place-items:center;

background:
linear-gradient(
135deg,
#020617,
#0f172a,
#1e293b
);

overflow:hidden;

}

.card{

width:500px;
max-width:90%;

padding:60px 50px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.12);

backdrop-filter:
blur(20px);

border-radius:30px;

box-shadow:
0 25px 70px rgba(0,0,0,.4);

text-align:center;

}

h1{

font-size:48px;
font-weight:700;

color:white;

margin-bottom:10px;

}

.subtitle{

color:#cbd5e1;

margin-bottom:35px;

font-size:15px;

}

input{

width:100%;

padding:16px;

margin-bottom:15px;

border:none;

outline:none;

border-radius:12px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.1);

color:white;

font-size:15px;

}

input::placeholder{

color:#cbd5e1;

}

button{

width:100%;

padding:16px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1d4ed8;

}

#message{

margin-top:15px;

color:#f87171;

font-size:14px;

}


body{

animation:
pageFade 1s ease;

}

.card{

animation:
cardEntrance 1s ease;

}

.btn,
button{

position:relative;

overflow:hidden;

}

.btn::before,
button::before{

content:"";

position:absolute;

top:0;
left:-100%;

width:100%;
height:100%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.25),
transparent
);

transition:.8s;

}

.btn:hover::before,
button:hover::before{

left:100%;

}

.btn:hover,
button:hover{

transform:
translateY(-3px)
scale(1.02);

box-shadow:
0 10px 25px rgba(37,99,235,.35);

}

@keyframes pageFade{

from{

opacity:0;

}

to{

opacity:1;

}

}

@keyframes cardEntrance{

0%{

opacity:0;

transform:
translateY(40px)
scale(.95);

}

100%{

opacity:1;

transform:
translateY(0)
scale(1);

}

}


.back{

display:block;

margin-top:20px;

text-decoration:none;

color:#93c5fd;

font-size:14px;

}

.footer{

margin-top:25px;

font-size:13px;

color:#94a3b8;

}

</style>

</head>

<body>

<div class="card">

<h1>
PJ Archive
</h1>

<p class="subtitle">
Administrator Access Only
</p>

<input
type="email"
id="email"
placeholder="Admin Email">

<input
type="password"
id="password"
placeholder="Password">

<button
onclick="loginAdmin()">

Login

</button>

<div id="message"></div>

<a
href="login.html"
class="back">

Back

</a>

<div class="footer">

Research Access Portal

</div>

</div>

<script>

async function loginAdmin(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const response =
await fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email,
password
})

});

const data =
await response.json();

if(!data.success){

document.getElementById(
"message"
).innerText =
data.message;

return;

}

window.location.href =
"/dashboard.html";

}

</script>

</body>

</html>
